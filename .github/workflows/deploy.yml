name: Deploy to ideaflow-tools

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发按钮

concurrency:
  group: deploy-main
  cancel-in-progress: false # 部署不打断,新 push 排队等

jobs:
  test:
    name: 门禁(build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 跑测试
        run: pnpm test

      - name: 构建产物(仅 typecheck 验证,不产出物)
        run: pnpm build

  deploy:
    name: 部署到 ideaflow-tools
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 SSH 私钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TOOLS_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 118.145.159.156 >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync 源码到服务器
        run: |
          rsync -az --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.ai-sessions' \
            --exclude '.env' \
            --exclude 'coverage' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@118.145.159.156:/home/ubuntu/docker-services/flow-batch/

      - name: 服务器上 build + up + health verify
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@118.145.159.156 << 'REMOTE'
          set -e
          cd /home/ubuntu/docker-services/flow-batch
          echo "=== 确保 deploy/.env symlink 指向 ../.env(rsync --delete 会清掉) ==="
          ln -sf ../.env deploy/.env
          cd deploy
          echo "=== docker compose build ==="
          docker compose build
          echo "=== docker compose up -d ==="
          docker compose up -d
          echo "=== 等 8 秒让容器起来 ==="
          sleep 8
          echo "=== 检查容器状态 ==="
          docker ps --filter name=flow-batch --format 'table {{.Names}}\t{{.Status}}'
          echo "=== 从公网 curl /health 验证 ==="
          RESP=$(curl -sS https://tools.ideaflow.pro/flow-batch/health)
          echo "响应:$RESP"
          if ! echo "$RESP" | grep -q '"code":0'; then
            echo "❌ health check 没返回 code:0,部署失败"
            docker logs flow-batch --tail 30
            exit 1
          fi
          echo "✅ 部署成功"
          REMOTE

      - name: 清理 SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
